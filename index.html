  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

mba'],['cacadaII','catacumba'],['catacumba','torre'],['torre','acampamento'],['acampamento','ermida'],['acampamento','desfiladeiro'],['ermida','cacadaIII'],['desfiladeiro','fortaleza'],['cacadaIII','fortaleza'],['fortaleza','covil'],['covil','baluarte'],['baluarte','litoral'],['baluarte','naufragio'],['litoral','estilhaco'],['naufragio','cacadaIV'],['estilhaco','selo'],['cacadaIV','selo'],['selo','limiar'],['limiar','escadaria'],['limiar','espelho'],['escadaria','planicie'],['espelho','cacadaV'],['planicie','coracao'],['cacadaV','coracao'],['coracao','farol'],['farol','precipicio'],['precipicio','garganta'],['vila','moinho'],['ruinas','cripta'],['porto','ilha'],['deserto','arena'],['acampamento','mina'],['cacadaIII','vigilia'],['baluarte','abadia'],['limiar','biblioteca'],['farol','memoria']];\n\n  TOWNS = {\n    pedrasola:{name:'Pedrasola', sub:'Vila de', banner:'vila', flavor:'Fumaça de lareiras e o martelo do ferreiro. Os aldeões depositam em você a última esperança do reino.', npc:'Anciã Maerwyn', npcBtn:'Falar com a Anciã Maerwyn', npcLine:'Maerwyn: \"A honra e a ambição moldam o fim que te espera. Escolha com peso, herói.\"', stock:['potion','ether','tonic','steel_sword','chain','ring_vigor','ring_focus']},\n    porto:{name:'Porto Salino', sub:'Enseada de', banner:'porto', flavor:'Gaivotas e maresia. Aqui os marinheiros contam da bruma que engole os incautos além das docas.', npc:'Capitã Yssra', npcBtn:'Ouvir a Capitã Yssra', npcLine:'Yssra: \"As terras adiante devoram tolos. Compre bem antes de partir — e volte para gastar o ouro.\"', stock:['potion','elixir','ether','ether2','tonic','rune_sword','plate','ring_fury','ring_aegis','amulet_crit']},\n    acampamento:{name:'Acampamento da Vanguarda', sub:'Posto Avançado', banner:'acampamento', flavor:'Tendas rasgadas pelo vento e fogueiras que nunca apagam. A guerra contra as sombras começa a poucos passos daqui.', npc:'Comandante Dorne', npcBtn:'Reportar-se ao Comandante Dorne', npcLine:'Dorne: \"O dragão está ao alcance. Muitos foram, nenhum voltou. Esteja pronto, soldado.\"', stock:['elixir','ether2','phoenix','tonic','flame_brand','dragon_fang','rune_plate','dragon_scale','amulet_sage']},\n    baluarte:{name:'Baluarte da Alvorada', sub:'Último Reduto', banner:'baluarte', flavor:'Muralhas improvisadas sob um céu rachado. Aqui reúnem-se os últimos que não fugiram — e não têm mais para onde fugir. As tochas ardem dia e noite contra a luz errada que vaza da Ferida.', npc:'Guardiã Selie', npcBtn:'Consultar a Guardiã Selie', npcLine:'Selie: \"O dragão caiu e o céu se abriu. Não foi você quem trouxe isto — mas talvez seja você quem o encerre. Vá bem armado: lá fora não há segundas tentativas.\"', stock:['elixir','elixir_supreme','ether2','phoenix','tonic','star_reaver','warden_plate','ring_eternity','ring_titan']},\n    limiar:{name:'O Limiar', sub:'Entre os Mundos', banner:'limiar', flavor:'Não é bem um lugar: é a hesitação entre dois lugares. Uma ilha de calma no meio do vazio, onde um barqueiro sem rosto ainda troca provisões por moedas que já não valem em mundo nenhum.', npc:'O Barqueiro Sem Rosto', npcBtn:'Ouvir o Barqueiro', npcLine:'Barqueiro: \"Muitos descem. Contam-se nos dedos os que voltam a subir. Leve o que puder — do outro lado, até o ouro esquece o que é.\"', stock:['elixir_supreme','ether_supreme','phoenix','star_tear','tonic','oblivion_blade','void_carapace','amulet_void','amulet_dawn']},\n    farol:{name:'O Último Farol', sub:'À Beira do Fim', banner:'farol', flavor:'Uma centelha teimosa de luz humana suspensa sobre o abismo. Quem a mantém acesa, ninguém sabe. Mas enquanto ela arder, ainda há um antes e um depois — e uma razão para dar o próximo passo.', npc:'A Chama', npcBtn:'Aquecer-se junto à Chama', npcLine:'A Chama crepita, e por um instante você jura ouvir a voz de Kaltharax: \"Até aqui, mortal. O resto do caminho, só você pode andar. Que a sua luz baste.\"', stock:['star_tear','elixir_supreme','ether_supreme','oblivion_blade','void_carapace','amulet_void','amulet_dawn']},\n  };\n\n  HUNTS = {\n    1:{name:'Bosque das Feras', flavor:'Um vale cerrado onde feras e saqueadores rondam sem fim. Bom lugar para afiar a lâmina e encher a bolsa.', pool:['goblin','wolf','skeleton','ghoul','bandit'], lvl:[1,7]},\n    2:{name:'Fossa dos Errantes', flavor:'Uma cratera enevoada de onde nada sai vivo por acaso. Presas mais duras, recompensas maiores.', pool:['spider','harpy','wraith','cultist','basilisk','revenant'], lvl:[7,16]},\n    3:{name:'Campos de Cinza', flavor:'A terra queimada aos pés da fortaleza fervilha de horrores. Aqui os veteranos forjam seu poder antes da marcha final.', pool:['dark_soldier','gargoyle','troll','wight','demon'], lvl:[16,28]},\n    4:{name:'Marca do Véu', flavor:'A franja corrompida do mundo, onde a Ferida já mordeu a terra. Presas tocadas pelo vazio, recompensas à altura do risco.', pool:['corrupto','afogado','vigia','aberracao','estilhacado'], lvl:[28,44]},\n    5:{name:'Campos do Desfazer', flavor:'No próprio interior do vazio, o que caça você tem tanta fome quanto a Fome. Só os mais fortes voltam de cada incursão — mais fortes ainda.', pool:['eco','sombravazia','espelhado','devorote','arautomenor'], lvl:[44,60]},\n  };\n\n  SCENES = {\n    floresta:[\n      {place:'Floresta Sussurrante', text:'A floresta engole a luz do sol. Galhos retorcidos sussurram nomes que você jurava ter esquecido, e a trilha se divide diante de você.', choices:[\n        {label:'Seguir a trilha principal', goto:3},\n        {label:'Investigar os sussurros entre as árvores', goto:1},\n      ]},\n      {place:'Floresta Sussurrante', text:'Entre as ruínas de um acampamento, goblins saqueiam os corpos de viajantes. Um deles ergue os olhos amarelos na sua direção.', choices:[\n        {label:'Emboscar os goblins', combat:'goblin', goto:2},\n      ]},\n      {place:'Floresta Sussurrante', text:'Com os saqueadores dispersos, você recolhe o que restou entre as bagagens abandonadas.', choices:[\n        {label:'Pegar os suprimentos', reward:{gold:18, item:'potion'}, goto:3},\n      ]},\n      {place:'Floresta Sussurrante', text:'A mata se abre numa clareira banhada de luz — mas um lobo faminto guarda a passagem, presas à mostra e magro de fome.', choices:[\n        {label:'Partilhar sua comida e passar em paz', align:2, reward:{xp:14}, tag:'Honra', goto:5},\n        {label:'Abater a fera', combat:'wolf', goto:5},\n      ]},\n      {place:'Floresta Sussurrante', text:'.', choices:[]},\n      {place:'Floresta Sussurrante', text:'A trilha desce rumo às fronteiras do reino. Ao longe avistam-se as Ruínas de Valdris e o Passo Gélido.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    montanha:[\n      {place:'Passo Gélido', text:'O vento corta a montanha como lâminas. Pegadas frescas na neve traem uma emboscada logo adiante.', choices:[\n        {label:'Avançar com cautela', goto:1},\n      ]},\n      {place:'Passo Gélido', text:'Bandidos saltam das rochas! O líder sorri, punhal em riste: — Sua bolsa ou sua vida, viajante.', choices:[\n        {label:'Enfrentá-los', combat:'bandit', goto:2},\n        {label:'Entregar 30 de ouro sem lutar', align:-1, reward:{gold:-30}, tag:'Covardia', goto:2},\n      ]},\n      {place:'Passo Gélido', text:'Sob uma pedra coberta de gelo repousa uma cota de anéis, abandonada por um guerreiro esquecido pelo tempo.', choices:[\n        {label:'Vestir a armadura', reward:{item:'chain'}, goto:3},\n      ]},\n      {place:'Passo Gélido', text:'Num santuário congelado, ossos se erguem: um esqueleto guardião range as mandíbulas e ataca.', choices:[\n        {label:'Destruir o guardião', combat:'skeleton', goto:4},\n      ]},\n      {place:'Passo Gélido', text:'O caminho desce em espiral rumo ao litoral. O cheiro de sal já toma o ar.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    ruinas:[\n      {place:'Ruínas de Valdris', text:'Colunas partidas jazem sob musgo e silêncio milenar. Sobre um altar rachado repousa uma lâmina que pulsa com runas frias.', choices:[\n        {label:'Tomar a Lâmina Rúnica', align:-1, reward:{item:'rune_sword'}, tag:'Ambição', combat:'ghoul', goto:1},\n        {label:'Ajoelhar-se e honrar os mortos', align:2, reward:{xp:20}, tag:'Honra', combat:'ghoul', goto:1},\n      ]},\n      {place:'Ruínas de Valdris', text:'Perturbado o repouso, outro morto se ergue das lajes: um esqueleto de armadura enferrujada avança sobre você.', choices:[\n        {label:'Enfrentar o guardião', combat:'skeleton', goto:2},\n      ]},\n      {place:'Ruínas de Valdris', text:'Com os mortos aquietados, o silêncio retorna. Uma trilha estreita leva de volta ao coração do reino.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    toca:[\n      {place:'Toca da Alcateia', text:'A toca fede a feras e a morte. Ossos cobrem o chão. Das trevas ergue-se Fenrada, a Loba-Mãe — maior que um cavalo, olhos de brasa fixos em você.', choices:[\n        {label:'Enfrentar a Loba-Mãe', combat:'fenrada', goto:1},\n      ]},\n      {place:'Toca da Alcateia', text:'Fenrada tomba com um uivo que ecoa pelas montanhas. Além da toca, a estrada aberta desce até o Porto Salino — o Ato I chega ao fim, e o mundo se abre diante de você.', choices:[\n        {label:'Seguir rumo ao litoral', complete:true},\n      ]},\n    ],\n    pantano:[\n      {place:'Pântano de Cinza', text:'O ar fede a coisas afogadas. Luzes fátuas dançam sobre a lama negra, chamando-o para dentro.', choices:[\n        {label:'Seguir as luzes', goto:1},\n        {label:'Contornar pela margem firme', goto:1},\n      ]},\n      {place:'Pântano de Cinza', text:'As luzes eram uma armadilha. Da bruma, um espectro se materializa — olhos vazios, mãos como garras de fumaça.', choices:[\n        {label:'Enfrentar a aparição', combat:'wraith', goto:2},\n      ]},\n      {place:'Pântano de Cinza', text:'O espectro se desfaz num lamento agudo. A margem firme conduz de volta às estradas.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    caverna:[\n      {place:'Cavernas Ecoantes', text:'A boca da caverna exala ar frio e úmido. Teias grossas como cordas pendem da escuridão.', choices:[\n        {label:'Acender uma tocha e avançar', goto:1},\n        {label:'Deslizar em silêncio pelas sombras', goto:1},\n      ]},\n      {place:'Cavernas Ecoantes', text:'O chão treme com passos de muitas pernas. Uma aranha cavernosa desce do teto, presas gotejando veneno.', choices:[\n        {label:'Enfrentar a aranha', combat:'spider', goto:2},\n      ]},\n      {place:'Cavernas Ecoantes', text:'Numa câmara de cristais, um anel de aço escuro repousa sobre um esqueleto. Ao tocá-lo, harpias despertam nas alturas com gritos estridentes.', choices:[\n        {label:'Pegar o Anel da Égide e enfrentá-las', reward:{item:'ring_aegis'}, combat:'harpy', goto:3},\n      ]},\n      {place:'Cavernas Ecoantes', text:'A câmara se aquieta. Uma fenda de luz marca a saída de volta à superfície.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    deserto:[\n      {place:'Dunas de Vhal', text:'O sol de brasa cozinha as dunas cinzentas. Uma miragem tremula ao longe — água, ou algo pior.', choices:[\n        {label:'Seguir a miragem', goto:1},\n        {label:'Orientar-se pelas estrelas', goto:1},\n      ]},\n      {place:'Dunas de Vhal', text:'Sob a areia, bandidos do deserto emergem em emboscada, panos cobrindo o rosto e adagas em punho.', choices:[\n        {label:'Enfrentar os salteadores', combat:'bandit', goto:2},\n      ]},\n      {place:'Dunas de Vhal', text:'Entre ossos calcinados, um basilisco ergue a cabeça. Seu olhar promete pedra a quem o encarar diretamente.', choices:[\n        {label:'Desviar o olhar e atacar', combat:'basilisk', goto:3},\n      ]},\n      {place:'Dunas de Vhal', text:'O basilisco tomba na areia. Entre seus despojos brilha um anel escarlate — e adiante, as catacumbas aguardam.', choices:[\n        {label:'Recolher o Anel da Fúria e partir', reward:{item:'ring_fury'}, complete:true},\n      ]},\n    ],\n    catacumba:[\n      {place:'Catacumbas de Vhal', text:'Corredores de pedra descem à escuridão. Túmulos de reis esquecidos revestem as paredes, alguns lacrados, outros abertos.', choices:[\n        {label:'Saquear os túmulos', align:-1, reward:{gold:40}, tag:'Ganância', goto:1},\n        {label:'Rezar pelos mortos', align:2, reward:{xp:30}, tag:'Piedade', goto:1},\n      ]},\n      {place:'Catacumbas de Vhal', text:'Os mortos não gostam de visitas. Um esqueleto real desperta, coroa tombada, espada em riste.', choices:[\n        {label:'Enfrentar o guardião', combat:'skeleton', goto:2},\n      ]},\n      {place:'Catacumbas de Vhal', text:'No salão final, um tumular ancião envolto em bruma verde levita sobre seu sarcófago.', choices:[\n        {label:'Enfrentar o tumular', combat:'wight', goto:3},\n      ]},\n      {place:'Catacumbas de Vhal', text:'O último morto retorna ao pó. Sobre o sarcófago repousa um amuleto de olho carmesim — e uma escada sobe rumo à Torre do Necromante.', choices:[\n        {label:'Tomar o Amuleto do Predador', reward:{item:'amulet_crit'}, complete:true},\n      ]},\n    ],\n    torre:[\n      {place:'Torre do Necromante', text:'A torre negra se ergue contra o céu doente. Do interior sopra um frio de sepultura. Um morto-vivo renegado guarda a escadaria.', choices:[\n        {label:'Subir a escadaria', combat:'revenant', goto:1},\n      ]},\n      {place:'Torre do Necromante', text:'No topo, entre velas verdes, Mordrath ergue os braços — os mortos de todo o reino atendem ao seu chamado. — Mais um herói para minha coleção.', speaker:'Mordrath, o Necromante', choices:[\n        {label:'Enfrentar o Necromante', combat:'mordrath', goto:2},\n      ]},\n      {place:'Torre do Necromante', text:'Mordrath se desfaz em cinzas e maldições. Seu domínio quebrado, o caminho para a linha de frente se abre — o Ato II termina, e a guerra verdadeira começa.', choices:[\n        {label:'Marchar para a vanguarda', complete:true},\n      ]},\n    ],\n    ermida:[\n      {place:'Ermida do Oráculo', text:'Uma vidente cega toca sua testa com dedos gelados. — Vejo o Dragão Negro, Kaltharax. E vejo você. Mas não sei se como salvador... ou algoz.', speaker:'Oráculo Cega', choices:[\n        {label:'Pedir poder para a batalha final', align:-1, reward:{spell:'meteor'}, tag:'Ambição', goto:1},\n        {label:'Pedir bênção e sabedoria', align:2, reward:{spell:'holy', heal:'full', xp:30}, tag:'Honra', goto:1},\n      ]},\n      {place:'Ermida do Oráculo', text:'Ela sussurra ao vento: — A Fortaleza Sombria guarda o único caminho até o covil. Vá, mas volte inteiro. O reino inteiro respira em seus pulmões agora.', speaker:'Oráculo Cega', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    desfiladeiro:[\n      {place:'Desfiladeiro Flamejante', text:'Rios de lava serpenteiam entre paredões negros. O calor distorce o ar. Uma frágil ponte de pedra atravessa o abismo.', choices:[\n        {label:'Atravessar a ponte', goto:1},\n      ]},\n      {place:'Desfiladeiro Flamejante', text:'Uma estátua se move: uma gárgula de pedra desdobra as asas e mergulha sobre você, garras de granito à frente.', choices:[\n        {label:'Enfrentar a gárgula', combat:'gargoyle', goto:2},\n      ]},\n      {place:'Desfiladeiro Flamejante', text:'Numa forja profana crepita o Tição Flamejante, guardado por um demônio de chamas. O calor lambe sua pele.', choices:[\n        {label:'Tomar o Tição e enfrentar o demônio', align:-1, reward:{item:'flame_brand'}, tag:'Ambição', combat:'demon', goto:3},\n        {label:'Destruir a forja profana e enfrentá-lo', align:2, reward:{xp:44, item:'ring_aegis'}, tag:'Honra', combat:'demon', goto:3},\n      ]},\n      {place:'Desfiladeiro Flamejante', text:'O demônio se dissolve em brasas. Além do desfiladeiro, os muros da Fortaleza Sombria cortam o horizonte.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    fortaleza:[\n      {place:'Fortaleza Sombria', text:'Portões de ferro rangem ao seu toque. Um soldado das sombras patrulha o corredor de entrada, elmo baixado, lâmina pronta.', choices:[\n        {label:'Forçar a entrada', combat:'dark_soldier', goto:1},\n      ]},\n      {place:'Fortaleza Sombria', text:'No pátio central, Vharok, o General das Sombras, aguarda montado sobre uma pilha de armaduras vazias. — A chave do covil? Terá de arrancá-la do meu cadáver.', speaker:'Vharok, General das Sombras', choices:[\n        {label:'Enfrentar o General', combat:'general', goto:2},\n      ]},\n      {place:'Fortaleza Sombria', text:'Vharok cai de joelhos e a chave é sua. Além do último portão, o ar esquenta e cheira a enxofre. O Covil de Kaltharax aguarda.', choices:[\n        {label:'Rumar ao covil', complete:true},\n      ]},\n    ],\n    covil:[\n      {place:'Covil de Kaltharax', text:'O covil arde em brasas eternas. O Dragão Negro ergue a cabeça, olhos como fornalhas. — Outro herói. Ou outro tolo. Diga-me: vem me matar, ou tomar meu poder?', speaker:'Kaltharax', choices:[\n        {label:'Empunhar a arma e acabar com isto', combat:'dragon', goto:1},\n        {label:'Propor uma trégua — chega de sangue', align:2, tag:'Honra', goto:2},\n      ]},\n      {place:'Covil de Kaltharax', text:'Kaltharax tomba, e a montanha estremece até as raízes. Mas em seu último fôlego, o dragão range algo que gela mais que a morte: — Tolo... eu era o ÚLTIMO SELO. Enquanto meu coração batia, a Ferida permanecia fechada. Agora... ela acorda.', speaker:'Kaltharax', choices:[\n        {label:'Destruir o coração e chorar o engano', set:{dragonPath:'destroy'}, align:1, tag:'Honra', goto:3},\n        {label:'Absorver seu poder — você precisará de tudo agora', set:{dragonPath:'absorb'}, align:-3, tag:'Ambição', goto:3},\n      ]},\n      {place:'Covil de Kaltharax', text:'O dragão inclina a colossal cabeça, incrédulo. — Em mil anos, ninguém ousou oferecer paz. Então ouça o que nenhum herói jamais ouviu: eu nunca fui seu inimigo. Sou o SELO que prende a Fome do lado de fora do mundo. E, agora, algo lá dentro se mexe.', speaker:'Kaltharax', choices:[\n        {label:'Selar um pacto — enfrentar a Fome juntos', set:{dragonPath:'pact'}, align:2, tag:'Honra', goto:3},\n        {label:'Era uma armadilha — atacar o dragão!', align:-2, tag:'Traição', combat:'dragon', goto:1},\n      ]},\n      {place:'Covil de Kaltharax', text:'Um estrondo rasga o firmamento. Acima do covil, o céu se abre numa ferida de luz sem cor — e do outro lado, algo antigo demais para ter nome RESPIRA. As sombras de Eldros nunca vieram do dragão. Vieram dali. E a verdadeira guerra apenas começa.', choices:[\n        {label:'Rumar ao Baluarte da Alvorada', complete:true},\n      ]},\n    ],\n    litoral:[\n      {place:'Litoral Cinéreo', text:'O mar não é mais azul. Sob o céu rasgado, as ondas trazem cinzas no lugar da espuma, e cada uma sussurra numa língua que precede as palavras. Na praia jazem barcos petrificados, tripulações inteiras viradas sal.', choices:[\n        {label:'Seguir a linha da praia', goto:1},\n        {label:'Vasculhar os corpos salgados', goto:2},\n      ]},\n      {place:'Litoral Cinéreo', text:'Entre os cascos quebrados, vultos se erguem: afogados de olhos leitosos, água escorrendo de bocas que ainda tentam gritar um aviso. Eles avançam.', choices:[\n        {label:'Abrir caminho pela lâmina', combat:'afogado', goto:3},\n      ]},\n      {place:'Litoral Cinéreo', text:'Um dos corpos aperta em punho um diário encharcado. As últimas linhas ainda legíveis: \"A Ferida chama os mortos de volta. Não morram perto do mar.\" Sob o corpo, uma bolsa de moedas.', choices:[\n        {label:'Recolher o ouro e honrar o morto', align:1, reward:{gold:80, xp:40}, tag:'Piedade', goto:1},\n        {label:'Saquear tudo sem olhar para trás', align:-1, reward:{gold:140}, tag:'Ganância', goto:1},\n      ]},\n      {place:'Litoral Cinéreo', text:'No fim da praia, uma torre de vigia inclinada resiste às ondas de cinza. Dentro, um farol morto — e o arrastar pesado de algo grande subindo a escada em espiral.', choices:[\n        {label:'Enfrentar o que sobe', combat:'afogado', goto:4},\n      ]},\n      {place:'Litoral Cinéreo', text:'Do alto da torre você enfim avista o destino: a silhueta submersa de uma cidade inteira, tragada pelas águas quando o céu se abriu. É por ali que se chega ao coração da Ferida.', choices:[\n        {label:'Descer rumo à Cidade Afogada', complete:true},\n      ]},\n    ],\n    naufragio:[\n      {place:'Cidade Afogada', text:'Você desce por ruas que já foram mercados, agora catedrais de água parada. Peixes cegos nadam entre janelas. O ar preso em bolsões cheira a séculos. Uma praça se abre adiante, dominada por uma estátua sem rosto.', choices:[\n        {label:'Cruzar a praça', goto:1},\n        {label:'Contornar pelos becos submersos', goto:2},\n      ]},\n      {place:'Cidade Afogada', text:'A estátua sem rosto vira a cabeça. Não era estátua. Um vigia de ossos, guardião antigo da cidade, ergue uma alabarda coberta de cracas.', choices:[\n        {label:'Derrubar o guardião', combat:'vigia', goto:4},\n      ]},\n      {place:'Cidade Afogada', text:'Nos becos, você encontra um sino de bronze intacto. Uma inscrição diz: \"Toque para chamar os que ainda dormem.\" Pode ser socorro. Pode ser condenação.', choices:[\n        {label:'Tocar o sino', goto:3},\n        {label:'Deixar os mortos dormirem', align:1, reward:{xp:50}, tag:'Prudência', goto:4},\n      ]},\n      {place:'Cidade Afogada', text:'O sino ecoa fundo. Das casas afogadas respondem centenas de vozes — e uma delas, mais clara, agradece: um espírito guia você por um atalho seguro e deixa um presente antes de se desfazer.', speaker:'Espírito Grato', choices:[\n        {label:'Aceitar a bênção', align:1, reward:{item:'ether_supreme', xp:60}, tag:'Fé', goto:4},\n      ]},\n      {place:'Cidade Afogada', text:'No centro submerso ergue-se a antiga Casa do Selo, suas portas marcadas com o mesmo símbolo do dragão, lacradas há mil anos. E algo do outro lado bate — devagar, paciente.', choices:[\n        {label:'Forçar as portas seladas', reward:{item:'star_reaver'}, combat:'vigia', goto:5},\n      ]},\n      {place:'Cidade Afogada', text:'As portas cedem e a água recua, como se temesse o que há dentro. Um corredor seco desce em espiral rumo aos estilhaços do céu caído. Não há mais volta a partir daqui.', choices:[\n        {label:'Descer ao coração da Ferida', complete:true},\n      ]},\n    ],\n    estilhaco:[\n      {place:'Os Estilhaços', text:'Você emerge num lugar impossível: cacos do próprio céu flutuam no vazio, ilhas de pedra e nuvem suspensas sobre o nada. Pontes de luz trêmula ligam um caco a outro. Muito abaixo — ou seria acima? — pulsa a Ferida.', choices:[\n        {label:'Atravessar a ponte de luz', goto:1},\n        {label:'Saltar entre os cacos menores', goto:2},\n      ]},\n      {place:'Os Estilhaços', text:'No meio da ponte, o ar se dobra e uma aberração da fenda se desdobra do nada — membros a mais, geometria errada, faminta pela sua forma definida.', choices:[\n        {label:'Enfrentar a aberração', combat:'aberracao', goto:3},\n      ]},\n      {place:'Os Estilhaços', text:'Você calcula os saltos entre os cacos; um erro e cairá para sempre. Num dos fragmentos crescem cristais apontando para dentro — pura energia da Ferida, perigosa de tocar.', choices:[\n        {label:'Colher a energia proibida', align:-1, reward:{item:'amulet_void'}, tag:'Ambição', combat:'estilhacado', goto:3},\n        {label:'Recusar o poder envenenado', align:1, reward:{xp:80}, tag:'Sabedoria', goto:3},\n      ]},\n      {place:'Os Estilhaços', text:'Num caco maior, os restos de heróis anteriores flutuam em círculo, congelados no instante da morte, armas ainda erguidas contra o céu. Ninguém chegou tão longe — e ninguém voltou.', choices:[\n        {label:'Recolher o que deixaram e prosseguir', reward:{gold:220, item:'elixir_supreme'}, goto:4},\n      ]},\n      {place:'Os Estilhaços', text:'Adiante, o maior dos cacos sustenta um templo intacto: o Santuário do Selo, onde o Arauto da Fome monta guarda diante da Ferida aberta. Você respira fundo. É aqui.', choices:[\n        {label:'Rumar ao Santuário do Selo', complete:true},\n      ]},\n    ],\n    selo:[\n      {place:'Santuário do Selo', text:'Dentro do templo suspenso, a Ferida enche o ar de uma luz que dói lembrar. Diante dela flutua Ixthar, o Arauto da Fome — uma coroa de olhos girando onde deveria haver um rosto. — Pequena coisa definida. Venha. A Fome tem lugar para você.', speaker:'Ixthar, o Arauto da Fome', choices:[\n        {label:'Desafiar o Arauto', combat:'ixthar', goto:1},\n        {label:'Perguntar o que é a Fome', goto:2},\n      ]},\n      {place:'Santuário do Selo', text:'Ixthar se dissolve em fumaça de estrelas mortas. Por um instante a Ferida estremece — mas não se fecha. Uma voz sem boca ecoa do outro lado: selá-la por fora é impossível. É preciso atravessá-la.', choices:[\n        {label:'Atravessar a Ferida', complete:true},\n      ]},\n      {place:'Santuário do Selo', text:'— O que é a Fome? — a coroa de olhos gira. — Somos o que existia antes da primeira estrela. Vocês nos chamam de fim; nós nos chamamos de lar. Seu dragão nos prendeu do lado de fora. Vocês, tolos, abriram a porta. — E Ixthar avança.', speaker:'Ixthar, o Arauto da Fome', choices:[\n        {label:'Silenciar o Arauto', combat:'ixthar', goto:1},\n      ]},\n    ],\n    escadaria:[\n      {place:'Escadaria Sem Fim', text:'Do outro lado da Ferida não há chão, apenas uma escada de degraus soltos descendo à escuridão absoluta. Atrás de você, o mundo que conhece encolhe até virar uma única estrela pálida.', choices:[\n        {label:'Descer os degraus', goto:1},\n        {label:'Olhar uma última vez para o mundo', align:1, reward:{xp:60}, tag:'Coragem', goto:1},\n      ]},\n      {place:'Escadaria Sem Fim', text:'A cada degrau, um eco de você mesmo sobe na direção contrária — passos que você ainda não deu, escolhas que talvez faça. Um deles para, vira o rosto, e ataca.', choices:[\n        {label:'Enfrentar o eco', combat:'eco', goto:2},\n      ]},\n      {place:'Escadaria Sem Fim', text:'O eco se apaga como fumaça. No degrau onde caiu resta uma lembrança que não é sua: a sensação de já ter vencido isto antes, muitas vezes, sempre em vão. A dúvida pesa mais que qualquer armadura.', choices:[\n        {label:'Rejeitar a dúvida e seguir', align:1, reward:{xp:100}, tag:'Coragem', goto:3},\n        {label:'Absorver a lembrança amarga', align:-1, reward:{item:'ring_titan'}, tag:'Ambição', goto:3},\n      ]},\n      {place:'Escadaria Sem Fim', text:'A escada termina numa margem de vidro negro. À frente, refletida em toda parte, ergue-se uma cidade construída inteiramente de espelhos: a morada dos que a Fome já consumiu.', choices:[\n        {label:'Entrar na Cidade Espelhada', complete:true},\n      ]},\n    ],\n    espelho:[\n      {place:'Cidade Espelhada', text:'Cada superfície devolve não o seu rosto, mas os rostos dos que vieram antes. Ruas de vidro reproduzem ao infinito uma multidão de mortos que a Fome guardou como lembranças. Alguns se viram para você.', choices:[\n        {label:'Atravessar em silêncio', goto:1},\n        {label:'Chamar por alguém conhecido', goto:2},\n      ]},\n      {place:'Cidade Espelhada', text:'Num salão de espelhos, uma figura familiar se materializa: Mordrath, o Necromante que você já derrotou, agora um reflexo oco a serviço da Fome. — Você me matou uma vez. Aqui, a morte é só mais um espelho.', speaker:'Reflexo de Mordrath', choices:[\n        {label:'Derrotá-lo outra vez', combat:'espelhado', goto:3},\n      ]},\n      {place:'Cidade Espelhada', text:'Você chama um nome — e um reflexo responde. É alguém que você perdeu, sorrindo, mão estendida, convidando você a ficar para sempre neste instante perfeito e falso.', choices:[\n        {label:'Recusar a mentira gentil', align:1, reward:{xp:120}, tag:'Sabedoria', goto:3},\n        {label:'Ficar só mais um instante', align:-1, reward:{gold:160}, goto:3},\n      ]},\n      {place:'Cidade Espelhada', text:'Quebrado o encanto, os espelhos racham em teia. Por uma fenda entre reflexos, você vislumbra o que sustenta esta cidade: uma planície onde as próprias coisas se desfazem em ideia.', choices:[\n        {label:'Sair para a Planície do Desfazer', complete:true},\n      ]},\n    ],\n    planicie:[\n      {place:'Planície do Desfazer', text:'Aqui a realidade é apenas um hábito que a Fome esqueceu. A grama esquece de ser verde; o horizonte esquece de existir. Andar em linha reta é um ato de pura vontade. Ao longe, algo imenso pulsa como um coração enterrado.', choices:[\n        {label:'Marchar rumo ao pulso', goto:1},\n        {label:'Fixar a mente numa única lembrança', align:1, reward:{xp:90}, tag:'Coragem', goto:1},\n      ]},\n      {place:'Planície do Desfazer', text:'Larvas devoradoras rastejam da terra que se desfaz — bocas sem corpo, mastigando o próprio nada. Elas sentem a sua definição, o seu ser inteiro, e têm fome.', choices:[\n        {label:'Queimar as larvas', combat:'devorote', goto:2},\n      ]},\n      {place:'Planície do Desfazer', text:'No meio do vazio, um servo da Fome ajoelha-se e oferece uma coroa de escuridão. — Pare de resistir. Junte-se a nós e nunca mais sentirá dor, medo ou perda. Basta esquecer quem você é.', speaker:'Servo da Fome', choices:[\n        {label:'Recusar e cortar a mão que oferece', align:1, reward:{xp:140}, tag:'Coragem', combat:'arautomenor', goto:3},\n        {label:'Aceitar a coroa — o poder é imenso', align:-2, reward:{item:'oblivion_blade'}, tag:'Ambição', combat:'arautomenor', goto:3},\n      ]},\n      {place:'Planície do Desfazer', text:'O pulso enterrado agora enche todo o céu que não existe. Você chegou ao Coração da Sombra, onde a Rainha Consumida guarda a última porta antes da própria Fome.', choices:[\n        {label:'Enfrentar o Coração', complete:true},\n      ]},\n    ],\n    coracao:[\n      {place:'Coração da Sombra', text:'No centro de tudo late um coração do tamanho de uma catedral, e diante dele flutua Nyxa — a primeira mortal que a Fome tomou, coroada de vazio, bela e terrível. — Bem-vindo ao fim. Eu resisti como você resiste. Veja no que me tornei.', speaker:'Nyxa, a Rainha Consumida', choices:[\n        {label:'Libertá-la da Fome pela lâmina', align:1, tag:'Compaixão', combat:'nyxa', goto:1},\n        {label:'Enfrentá-la sem piedade', combat:'nyxa', goto:1},\n      ]},\n      {place:'Coração da Sombra', text:'Nyxa cai, e por um instante seus olhos voltam a ser humanos. — Obrigada — ela sussurra. — Atrás do coração há uma última porta. Do outro lado está a Fome em pessoa. Feche-a... por mim. — E se apaga em paz.', speaker:'Nyxa', choices:[\n        {label:'Cruzar a última porta', complete:true},\n      ]},\n    ],\n    precipicio:[\n      {place:'Precipício do Fim', text:'Além da última porta não há mais cenário: só uma língua de pedra sobre um abismo que engole a própria luz. Lá no fundo, algo maior que a palavra grande abre o que talvez seja um olho. A Fome sabe o seu nome agora.', choices:[\n        {label:'Avançar sobre o precipício', goto:1},\n        {label:'Reunir tudo o que você é para o que vem', align:1, reward:{xp:160, heal:'full'}, tag:'Coragem', goto:1},\n      ]},\n      {place:'Precipício do Fim', text:'Um arauto derradeiro barra o caminho — o último servo entre você e o abismo, tecido dos gritos de mil mundos comidos. — Ninguém passa. Ninguém nunca passou.', speaker:'Arauto Derradeiro', choices:[\n        {label:'Provar que ele está errado', combat:'arautofinal', goto:2},\n      ]},\n      {place:'Precipício do Fim', text:'O arauto se desfaz num último grito multiplicado. À sua frente, a Garganta do Vazio se escancara — a boca de onde nenhuma estrela jamais voltou. Você dá o passo que nenhum herói ousou dar.', choices:[\n        {label:'Entrar na Garganta', complete:true},\n      ]},\n    ],\n    garganta:[\n      {place:'A Garganta do Vazio', text:'Não há palavras para o que preenche a Garganta. Chame-o de Xaal, o Devorador de Estrelas — a Fome que precede toda coisa. Sua voz não soa; simplesmente passa a ser verdade dentro de você: TUDO RETORNA A MIM. ATÉ VOCÊ.', speaker:'O Devorador', choices:[\n        {label:'Erguer-se contra o fim de tudo', combat:'devorador', goto:1},\n      ]},\n      {place:'A Garganta do Vazio', text:'O impossível acontece: a Fome vacila. Ferido pela primeira vez em toda a eternidade, o Devorador recua, e a Ferida sobre os mundos começa a se fechar. Mas não fechará sozinha. Alguém precisa selá-la — de dentro.', choices:[\n        {label:'Selar a Ferida e confiar que há um caminho de volta', ending:'seal', tag:'Esperança'},\n        {label:'Tomar o trono da Fome — se algo deve devorar, que seja você', ending:'consume', align:-3, tag:'Ambição'},\n        {label:'Fechar a Ferida com a própria vida, sem hesitar', ending:'sacrifice', tag:'Sacrifício'},\n      ]},\n    ],\n    moinho:[\n      {place:'Moinho Assombrado', text:'As pás do velho moinho giram sem vento algum. Dentro, alguém — ou algo — ainda mói. Os aldeões juram que o moleiro morreu há vinte anos.', choices:[\n        {label:'Entrar pelo portão rangente', goto:1},\n        {label:'Espiar pela janela antes', reward:{xp:12}, goto:1},\n      ]},\n      {place:'Moinho Assombrado', text:'Entre sacos podres, um espantalho desperta — palha escorrendo de um sorriso costurado. Ele arranca a própria estaca do chão e avança.', choices:[\n        {label:'Enfrentar o espantalho', combat:'espantalho', goto:2},\n      ]},\n      {place:'Moinho Assombrado', text:'No mezanino, o diário do moleiro: \"A farinha veio preta esta noite. Ela sussurra. Não vou parar de moer. Não consigo.\" Ao lado, sua bolsa de moedas intocada.', choices:[\n        {label:'Queimar a farinha maldita', align:2, reward:{xp:26}, tag:'Honra', goto:3},\n        {label:'Levar as moedas do morto', align:-1, reward:{gold:34}, tag:'Ganância', goto:3},\n      ]},\n      {place:'Moinho Assombrado', text:'A mó para de girar pela primeira vez em vinte anos — e do porão sobe um segundo espantalho, maior, vestindo o casaco do moleiro.', choices:[\n        {label:'Acabar com a maldição', combat:'espantalho', goto:4},\n      ]},\n      {place:'Moinho Assombrado', text:'Silêncio, enfim. Sobre a bancada, o moleiro deixou um tônico de ervas que o tempo não estragou.', choices:[\n        {label:'Guardar o tônico e partir', reward:{item:'tonic'}, complete:true},\n      ]},\n    ],\n    cripta:[\n      {place:'Cripta do Cavaleiro', text:'Uma cripta solitária guarda o túmulo de um cavaleiro que enfrentou a alcateia — e perdeu. O selo na porta avisa em runa antiga: \"Aqui jaz quem não aceitou jazer.\" Você sente um poder muito acima do comum.', choices:[\n        {label:'Quebrar o selo e enfrentá-lo', tag:'Desafio', combat:'cavaleiro_caido', goto:1},\n        {label:'Recuar — ainda não é a hora', leave:true},\n      ]},\n      {place:'Cripta do Cavaleiro', text:'O Cavaleiro Caído tomba de joelhos uma última vez — e, antes de virar pó, faz continência. O elmo dele agora é seu, e com ele a honra de quem o venceu.', choices:[\n        {label:'Prestar continência e partir', reward:{xp:60}, complete:true},\n      ]},\n    ],\n    ilha:[\n      {place:'Ilha do Farol Morto', text:'Um barco a remo range até a ilha onde o farol apagou há uma geração. Das pedras, sobe um canto — doce demais para este mar.', choices:[\n        {label:'Seguir o canto entre as pedras', goto:1},\n        {label:'Tapar os ouvidos com cera', align:1, reward:{xp:30}, tag:'Prudência', goto:2},\n      ]},\n      {place:'Ilha do Farol Morto', text:'O canto tinha dentes. Uma sereia lamentosa emerge da espuma, bela até o instante em que abre a boca de verdade.', choices:[\n        {label:'Resistir e lutar', combat:'sereia', goto:2},\n      ]},\n      {place:'Ilha do Farol Morto', text:'Na base do farol, o guardião que nunca abandonou o posto: um golem moldado do próprio sal do mar, coberto de cracas, ainda cumprindo ordens de ninguém.', choices:[\n        {label:'Abrir caminho até a lanterna', combat:'golem_sal', goto:3},\n      ]},\n      {place:'Ilha do Farol Morto', text:'No topo, a grande lanterna espera apenas uma centelha. Sobre o mecanismo, um sigilo lunar esquecido pelo último faroleiro.', choices:[\n        {label:'Reacender o farol para os navios', align:2, reward:{item:'sigilo_lua', xp:44}, tag:'Honra', goto:4},\n        {label:'Arrancar o sigilo e deixar o escuro', align:-1, reward:{item:'sigilo_lua', gold:70}, tag:'Ambição', goto:4},\n      ]},\n      {place:'Ilha do Farol Morto', text:'O barco range de volta ao porto. Atrás de você, a ilha guarda de novo seus segredos — menos um.', choices:[\n        {label:'Retornar ao mapa', complete:true},\n      ]},\n    ],\n    arena:[\n      {place:'Arena de Sal', text:'Um anfiteatro escavado numa cratera de sal. Mercadores, piratas e coisas encapuzadas apostam alto. O Mestre da Arena sorri com dentes de ouro: — Três combates, sem descanso, sem fuga. Ouro e glória. Ou uma cova rasa de sal.', speaker:'Mestre da Arena', choices:[\n        {label:'Aceitar o torneio', goto:1},\n        {label:'Recusar e partir', leave:true},\n      ]},\n      {place:'Arena de Sal', text:'Primeiro combate: os portões sobem e um basilisco criado em cativeiro entra na areia, magro de fome proposital.', choices:[\n        {label:'Lutar!', combat:'basilisk', goto:2},\n      ]},\n      {place:'Arena de Sal', text:'A multidão ruge seu nome. O Mestre ergue duas bolsas: — Sai agora com a pequena... ou arrisca tudo no segundo combate.', speaker:'Mestre da Arena', choices:[\n        {label:'Continuar no torneio', combat:'revenant', goto:3},\n        {label:'Sair com a bolsa pequena', reward:{gold:60}, leave:true},\n      ]},\n      {place:'Arena de Sal', text:'Última rodada. A arena silencia quando ELE entra: o Campeão invicto, armadura lavrada com os nomes de todos que enterrou na areia.', choices:[\n        {label:'Enfrentar o Campeão', combat:'campeao', goto:4},\n        {label:'Sair com a bolsa média', reward:{gold:130}, leave:true},\n      ]},\n      {place:'Arena de Sal', text:'O Campeão cai — e a arena explode. O Mestre, pálido, entrega a bolsa grande sem contar as moedas. Seu nome fica gravado na pedra de sal.', choices:[\n        {label:'Erguer a bolsa para a multidão', reward:{gold:280, xp:130}, complete:true},\n      ]},\n    ],\n    mina:[\n      {place:'Minas Incendiadas', text:'As minas ardem há trinta anos, e ninguém apagou o fogo porque ninguém voltou. Das galerias sobe um calor de forja e um brilho de ouro derretido.', choices:[\n        {label:'Descer pela galeria principal', goto:1},\n        {label:'Descer pelo poço de ventilação', reward:{xp:36}, goto:1},\n      ]},\n      {place:'Minas Incendiadas', text:'O brilho não era ouro. Uma salamandra vulcânica desenrola-se do veio incandescente, escamas gotejando fogo líquido.', choices:[\n        {label:'Enfrentar a salamandra', combat:'salamandra', goto:2},\n      ]},\n      {place:'Minas Incendiadas', text:'Um veio de ouro de verdade reluz na parede rachada — mas a rocha geme, e o calor dobra. Minerar aqui é apostar a vida.', choices:[\n        {label:'Minerar o veio sob risco', reward:{gold:150}, combat:'salamandra', goto:3},\n        {label:'Ignorar o ouro e avançar', align:1, reward:{xp:40}, tag:'Prudência', goto:3},\n      ]},\n      {place:'Minas Incendiadas', text:'No fundo da mina, algo usa as fornalhas como trono: um ceifador de guerra, forjado dos mortos da última expedição, foice de trilho retorcido.', choices:[\n        {label:'Derrubar o ceifador', combat:'ceifador', goto:4},\n      ]},\n      {place:'Minas Incendiadas', text:'As chamas baixam como se respeitassem. Entre as cinzas, um tônico de mineiro intacto dentro de um baú de ferro.', choices:[\n        {label:'Recolher e subir à superfície', reward:{item:'tonic', gold:60}, complete:true},\n      ]},\n    ],\n    vigilia:[\n      {place:'Vigília dos Caídos', text:'Uma colina de estandartes rasgados, onde os mortos da guerra montam guarda eterna. No topo, um vulto de armadura translúcida ergue a espada em desafio silencioso. Os soldados sussurram que ninguém jamais o venceu.', choices:[\n        {label:'Aceitar o duelo do Campeão Espectral', tag:'Desafio', combat:'campeao_espectral', goto:1},\n        {label:'Recuar — ainda não é a hora', leave:true},\n      ]},\n      {place:'Vigília dos Caídos', text:'O Campeão Espectral se desfaz em névoa e reverência. Onde ele tombou, seu estandarte de guerra permanece fincado — agora, ele marcha com você.', choices:[\n        {label:'Erguer o estandarte', reward:{xp:120}, complete:true},\n      ]},\n    ],\n    abadia:[\n      {place:'Abadia Rachada', text:'A Ferida partiu a abadia ao meio: metade reza no chão, metade flutua de cabeça para baixo. Entre as duas metades, monges do véu entoam um cântico que nenhuma boca humana deveria alcançar.', choices:[\n        {label:'Entrar pela nave partida', goto:1},\n        {label:'Contornar pelo claustro', goto:2},\n      ]},\n      {place:'Abadia Rachada', text:'Um monge do véu flutua até você, rosto coberto por pano branco que se move como se respirasse. Sob o pano, nenhum rosto — apenas a Fome, vestida de fé.', choices:[\n        {label:'Enfrentar o monge', combat:'monge_veu', goto:3},\n      ]},\n      {place:'Abadia Rachada', text:'No claustro, uma pia batismal rachada ainda guarda água que brilha por conta própria — a última bênção verdadeira deste lugar.', choices:[\n        {label:'Beber da água sagrada', align:1, reward:{heal:'full', xp:70}, tag:'Fé', goto:3},\n        {label:'Recolher a água para vender', align:-2, reward:{gold:180}, tag:'Ganância', goto:3},\n      ]},\n      {place:'Abadia Rachada', text:'No campanário, os sinos tocam sozinhos e de trás para frente. Enrolada neles, uma quimera da Ferida — costurada de três animais que nunca existiram juntos.', choices:[\n        {label:'Enfrentar a quimera', combat:'quimera', goto:4},\n      ]},\n      {place:'Abadia Rachada', text:'Do campanário partido, você avista o caminho ao Santuário do Selo. Um dos monges caídos aperta um tônico entre os dedos rígidos, como oferenda.', choices:[\n        {label:'Aceitar a oferenda e descer', reward:{item:'tonic'}, complete:true},\n      ]},\n    ],\n    biblioteca:[\n      {place:'Biblioteca dos Nuncas', text:'Corredores infinitos de estantes que sobem até virar céu. Cada livro é uma vida que nunca aconteceu: o rei que a peste levou cedo, a cidade que não foi fundada, você — em mil versões que nunca existirão. Um deles tem seu nome na lombada.', choices:[\n        {label:'Abrir o livro com seu nome', align:-1, reward:{xp:80}, tag:'Ambição', goto:1},\n        {label:'Deixar o livro fechado', align:1, reward:{xp:130}, tag:'Sabedoria', goto:1},\n      ]},\n      {place:'Biblioteca dos Nuncas', text:'As páginas farfalham por conta própria — e então se erguem: uma revoada de páginas famintas, cada uma cortante como navalha, cada uma querendo escrever você numa estante.', choices:[\n        {label:'Rasgar caminho pela revoada', combat:'pagina', goto:2},\n      ]},\n      {place:'Biblioteca dos Nuncas', text:'No centro da biblioteca, o Bibliotecário ergue os olhos de um livro em branco. — Sua história é rara. Deixe-me arquivá-la e lhe dou qualquer poder destas estantes. Você só precisa... parar de acontecer.', speaker:'O Bibliotecário', choices:[\n        {label:'Recusar — sua história continua', align:1, tag:'Coragem', combat:'bibliotecario', goto:3},\n        {label:'Exigir o poder E a sua história', align:-2, reward:{item:'ring_titan'}, tag:'Ambição', combat:'bibliotecario', goto:3},\n      ]},\n      {place:'Biblioteca dos Nuncas', text:'O Bibliotecário se desfaz em papel e poeira de séculos. Seu grimório sem fim cai aberto aos seus pés — e, nas estantes, o livro com seu nome ganha mais um capítulo, escrito por você.', choices:[\n        {label:'Seguir escrevendo', complete:true},\n      ]},\n    ],\n    memoria:[\n      {place:'Memória de Eldros', text:'Um caco de mundo que a Fome guardou como quem guarda uma foto: Pedrasola, num fim de tarde de verão que nunca existiu. O ferreiro martela. Crianças correm. Ninguém envelhece, ninguém morre, ninguém É. Dói de tão bonito.', choices:[\n        {label:'Caminhar pelas ruas da lembrança', goto:1},\n        {label:'Ficar um instante na praça, só mais um', align:1, reward:{xp:160}, tag:'Coragem', goto:1},\n      ]},\n      {place:'Memória de Eldros', text:'A vila inteira para ao mesmo tempo. Todas as cabeças viram para você no mesmo ângulo exato. A lembrança percebeu que você não pertence a ela — e lembranças, aqui, mordem.', choices:[\n        {label:'Enfrentar a lembrança hostil', combat:'lembranca', goto:2},\n      ]},\n      {place:'Memória de Eldros', text:'No fundo falso do céu de verão, abre-se uma pupila do tamanho da lua: o Olho do Abismo, colecionador de todas as lembranças roubadas. Ele não bloqueia seu caminho — apenas observa, e desafia. Nada mais mortal existe fora da própria Fome.', choices:[\n        {label:'Desafiar o Olho do Abismo', tag:'Desafio', combat:'olho_abismo', goto:3},\n        {label:'Partir em silêncio', complete:true},\n      ]},\n      {place:'Memória de Eldros', text:'O Olho se fecha para sempre, e mil lembranças roubadas escapam como vaga-lumes rumo aos mundos de onde vieram. Sobre a praça vazia resta uma coroa forjada de estrelas recuperadas — o maior troféu que este ou qualquer mundo pode dar.', choices:[\n        {label:'Erguer a Coroa de Estrelas', reward:{xp:400}, complete:true},\n      ]},\n    ],\n  };\n\n  ENDINGS = {\n    justo:{title:'A Aurora do Rei Justo', text:'Você retorna com as cinzas do dragão ao vento. O reino canta seu nome, e você o governa com a mesma honra que o trouxe até aqui. Eldros conhece, enfim, uma era de ouro.', fx:'ember'},\n    guardiao:{title:'O Guardião Silencioso', text:'Você destrói o coração e desaparece nas montanhas. Nenhuma coroa, nenhuma canção — apenas um mundo mais seguro, e um herói que ninguém jamais conhecerá. Às vezes, basta.', fx:'snow'},\n    tirano:{title:'O Trono de Cinzas', text:'O poder de Kaltharax corre em suas veias, quente e faminto. Você toma o reino pela força. Temem-no como temiam o dragão. Talvez, no fundo, você sempre tenha sido isto.', fx:'ember'},\n    pacto:{title:'O Pacto Eterno', text:'Dragão e mortal firmam uma aliança que redesenha a história. Kaltharax guarda os céus; você, a terra. Uma era de paz improvável começa, escrita por duas mãos inimigas.', fx:'firefly'},\n    selador:{title:'O Selador da Aurora', text:'Você crava sua vontade na Ferida e, degrau a degrau, refaz o caminho impossível de volta. O céu se costura acima de Eldros. Onde havia um herói perdido, ergue-se uma lenda que atravessou o fim de tudo — e voltou para contar.', fx:'firefly'},\n    guardioes:{title:'Os Dois Guardiões', text:'Kaltharax mergulha na Ferida ao seu lado, e juntos — dragão e mortal, antigos inimigos — vocês se tornam o novo Selo. Enquanto vigiarem, a Fome jamais passará. Uma era de paz improvável começa, guardada por duas sombras que escolheram a luz.', fx:'ember'},\n    portador:{title:'O Portador da Fome', text:'Você toma o trono do Devorador. O poder é vertiginoso, infinito, frio. Os mundos são poupados — não por misericórdia, mas porque agora pertencem a você. Reina sobre tudo o que existe, e ninguém saberá se ainda resta algo humano por trás desses olhos de estrela.', fx:'ember'},\n    martir:{title:'O Sacrifício Silencioso', text:'Você fecha a Ferida com a última batida do próprio coração. Não há volta, e você sabia. Em Eldros, o sol nasce sobre um reino que jamais conhecerá seu nome nem o preço que você pagou. Mas nasce. E isso sempre bastou.', fx:'snow'},\n  };\n\n  OVERLINES = [\n    'A escuridão toma o que restou de sua luz.',\n    'Seu corpo tomba, mas a lenda ainda não terminou.',\n    'O reino chega perto demais da ruína — mas não hoje.',\n  ];\n\n  state = {\n    screen:'title', hasSave:false, player:null, completed:{},\n    loc:null, page:0, combat:null, ending:null, over:null, huntId:null, huntStreak:0,\n    townId:'pedrasola', prevScreen:'town', toast:null, toastId:0, muted:false, talentOptions:null,\n  };\n\n  componentDidMount(){\n    this._lastScreen=this.state.screen; this._lastLevel=this.state.player?this.state.player.level:null; this._lastToastId=this.state.toastId||0;\n    try{ if(localStorage.getItem(this.KEY)) this.setState({hasSave:true}); }catch(e){}\n    try{ if(localStorage.getItem('eldros_mute')==='1') this.setState({muted:true}); }catch(e){}\n    this._unlock=()=>this._unlockAudio();\n    this._unlockEvents=['touchend','touchstart','pointerdown','mousedown','keydown'];\n    this._unlockEvents.forEach(ev=>window.addEventListener(ev, this._unlock, {passive:true}));\n    this._clickSfx=(e)=>{ const t=e.target; const b=(t&&t.closest)?t.closest('button'):null; if(b){ this._unlockAudio(); this.sfx('ui'); } };\n    window.addEventListener('click', this._clickSfx, true);\n  }\n  _unlockAudio(){ const c=this._ensureAudio(); if(!c) return; this._resume(); try{ if(!this._unlocked){ const b=c.createBuffer(1,1,22050); const src=c.createBufferSource(); src.buffer=b; src.connect(this._master||c.destination); src.start(0); this._unlocked=true; } }catch(e){} if(!this.state.muted) this.setAmbient(this.ambientForScreen(this.state.screen)); }\n  componentWillUnmount(){ try{ (this._unlockEvents||[]).forEach(ev=>window.removeEventListener(ev, this._unlock)); window.removeEventListener('click', this._clickSfx, true); clearTimeout(this._tt); if(this._ctx) this._ctx.close(); }catch(e){} }\n  componentDidUpdate(){\n    const s=this.state;\n    if(s.toast && s.toastId!==this._lastToastId){ clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:null}), 2500); }\n    if(s.screen!==this._lastScreen){\n      if(!s.muted) this.setAmbient(this.ambientForScreen(s.screen));\n      if(s.screen==='map') this._scrollMap(); else this._scrollToTop();\n      if(s.screen==='gameover') this.sfx('defeat');\n    }\n    if(s.player && this._lastLevel!=null && s.player.level>this._lastLevel) this.sfx('levelup');\n    this._lastScreen=s.screen; this._lastLevel=s.player?s.player.level:null; this._lastToastId=s.toastId;\n  }\n  _findScroller(){ let el=document.querySelector('[data-scroll=\"1\"]'); if(el) return el; const list=[...document.querySelectorAll('div')]; for(const d of list){ const s=getComputedStyle(d); if((s.overflowY==='auto'||s.overflowY==='scroll') && d.scrollHeight-d.clientHeight>4) return d; } return document.scrollingElement||document.documentElement; }\n  _scrollMap(){ const act=this.currentAct(); const apply=()=>{ const el=this._findScroller(); if(!el) return; const range=el.scrollHeight-el.clientHeight; if(range<=4){ el.scrollTop=0; return; } let top; const F={1:1.0,2:0.72,3:0.50,4:0.32,5:0.15,6:0.0}; top=range*(F[act]!=null?F[act]:0.5); try{ el.scrollTop=top; }catch(e){} }; requestAnimationFrame(()=>requestAnimationFrame(apply)); setTimeout(apply, 130); }\n  _scrollToTop(){ const apply=()=>{ const el=this._findScroller(); if(el){ try{ el.scrollTop=0; }catch(e){} } }; requestAnimationFrame(()=>requestAnimationFrame(apply)); setTimeout(apply, 60); }\n  _ensureAudio(){ if(this._ctx!==undefined) return this._ctx; try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC){ this._ctx=null; return null; } const ctx=new AC(); const m=ctx.createGain(); m.gain.value=this.state.muted?0:0.85; m.connect(ctx.destination); this._ctx=ctx; this._master=m; }catch(e){ this._ctx=null; } return this._ctx; }\n  _resume(){ const c=this._ensureAudio(); if(c && c.state==='suspended'){ try{ const pr=c.resume(); if(pr&&pr.catch) pr.catch(()=>{}); }catch(e){} } }\n  _noise(){ if(this._nb) return this._nb; const c=this._ctx; const n=Math.floor(c.sampleRate*0.8); const b=c.createBuffer(1,n,c.sampleRate); con
